<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sonrisa Perfecta — Asistente Virtual</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #FAF7F2;
      --white: #FFFFFF;
      --teal: #1A7A6E;
      --teal-light: #2A9D8F;
      --teal-pale: #E8F5F3;
      --gold: #C9A84C;
      --dark: #1C2B2A;
      --gray: #6B7B7A;
      --gray-light: #EEF2F1;
      --shadow: 0 8px 40px rgba(26,122,110,0.10);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    /* Background decoration */
    body::before {
      content: '';
      position: fixed;
      top: -120px;
      right: -120px;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(42,157,143,0.10) 0%, transparent 70%);
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -100px;
      left: -100px;
      width: 350px;
      height: 350px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(201,168,76,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .card {
      background: var(--white);
      border-radius: 24px;
      box-shadow: var(--shadow);
      width: 100%;
      max-width: 480px;
      overflow: hidden;
      animation: fadeUp 0.6s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Header */
    .header {
      background: linear-gradient(135deg, var(--teal) 0%, var(--teal-light) 100%);
      padding: 28px 28px 24px;
      position: relative;
      overflow: hidden;
    }
    .header::before {
      content: '✦';
      position: absolute;
      top: 16px;
      right: 24px;
      color: rgba(255,255,255,0.15);
      font-size: 48px;
      line-height: 1;
    }
    .header-top {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 12px;
    }
    .logo-circle {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      border: 2px solid rgba(255,255,255,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }
    .clinic-name {
      font-family: 'Playfair Display', serif;
      color: #fff;
      font-size: 20px;
      font-weight: 600;
      line-height: 1.2;
    }
    .clinic-sub {
      color: rgba(255,255,255,0.75);
      font-size: 12px;
      font-weight: 300;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4ECCA3;
      box-shadow: 0 0 0 3px rgba(78,204,163,0.3);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 3px rgba(78,204,163,0.3); }
      50%       { box-shadow: 0 0 0 6px rgba(78,204,163,0.1); }
    }
    .status-text {
      color: rgba(255,255,255,0.85);
      font-size: 13px;
      font-weight: 400;
    }

    /* Chat area */
    .chat-area {
      padding: 20px;
      height: 360px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
    }
    .chat-area::-webkit-scrollbar { width: 4px; }
    .chat-area::-webkit-scrollbar-track { background: transparent; }
    .chat-area::-webkit-scrollbar-thumb { background: var(--gray-light); border-radius: 4px; }

    .bubble {
      max-width: 82%;
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.55;
      animation: bubbleIn 0.3s ease both;
    }
    @keyframes bubbleIn {
      from { opacity: 0; transform: scale(0.94) translateY(6px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }
    .bubble.bot {
      background: var(--teal-pale);
      color: var(--dark);
      border-bottom-left-radius: 4px;
      align-self: flex-start;
    }
    .bubble.user {
      background: var(--teal);
      color: #fff;
      border-bottom-right-radius: 4px;
      align-self: flex-end;
    }
    .bubble-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.04em;
      margin-bottom: 4px;
      opacity: 0.6;
    }
    .bubble.bot .bubble-label { color: var(--teal); }
    .bubble.user .bubble-label { color: rgba(255,255,255,0.7); }

    .typing {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 14px 16px;
      background: var(--teal-pale);
      border-radius: 18px;
      border-bottom-left-radius: 4px;
      align-self: flex-start;
      max-width: 70px;
    }
    .typing span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--teal-light);
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30%            { transform: translateY(-6px); }
    }

    /* Input area */
    .input-area {
      padding: 16px 20px 20px;
      border-top: 1px solid var(--gray-light);
      background: var(--white);
    }
    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    textarea {
      flex: 1;
      border: 1.5px solid var(--gray-light);
      border-radius: 14px;
      padding: 12px 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: var(--dark);
      background: var(--cream);
      resize: none;
      outline: none;
      min-height: 48px;
      max-height: 120px;
      transition: border-color 0.2s;
      line-height: 1.5;
    }
    textarea::placeholder { color: var(--gray); }
    textarea:focus { border-color: var(--teal-light); }

    .send-btn {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--teal) 0%, var(--teal-light) 100%);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.2s, transform 0.15s;
    }
    .send-btn:hover { opacity: 0.9; transform: scale(1.05); }
    .send-btn:active { transform: scale(0.97); }
    .send-btn svg { width: 20px; height: 20px; fill: #fff; }

    .hint {
      text-align: center;
      font-size: 11px;
      color: var(--gray);
      margin-top: 10px;
      letter-spacing: 0.02em;
    }
    .hint span {
      color: var(--gold);
      font-weight: 500;
    }

    /* Powered by */
    .powered {
      margin-top: 18px;
      text-align: center;
      font-size: 11px;
      color: var(--gray);
      letter-spacing: 0.03em;
      animation: fadeUp 0.8s 0.3s ease both;
      opacity: 0;
    }
    .powered strong {
      color: var(--teal);
      font-weight: 500;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="header">
      <div class="header-top">
        <div class="logo-circle">🦷</div>
        <div>
          <div class="clinic-name">Sonrisa Perfecta</div>
          <div class="clinic-sub">Clínica Dental</div>
        </div>
      </div>
      <div class="status-bar">
        <div class="status-dot"></div>
        <div class="status-text">Sofía disponible ahora · Respuesta inmediata</div>
      </div>
    </div>

    <div class="chat-area" id="chatArea">
      <div class="bubble bot">
        <div class="bubble-label">Sofía</div>
        ¡Hola! Soy Sofía, tu asistente virtual de Clínica Dental Sonrisa Perfecta. 😊 ¿En qué te puedo ayudar hoy?
      </div>
    </div>

    <div class="input-area">
      <div class="input-row">
        <textarea
          id="userInput"
          placeholder="Escribe tu pregunta aquí..."
          rows="1"
          onkeydown="handleKey(event)"
          oninput="autoResize(this)"
        ></textarea>
        <button class="send-btn" onclick="sendMessage()">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
          </svg>
        </button>
      </div>
      <div class="hint">Puedes preguntar sobre <span>precios</span>, <span>horarios</span>, <span>servicios</span> y más</div>
    </div>
  </div>

  <div class="powered">
    Asistente potenciado por IA · <strong>Cincel Digital</strong>
  </div>

<script>
  const N8N_WEBHOOK_URL = "https://n8n.srv1299461.hstgr.cloud/webhook/sonrisa-perfecta";

  const chatArea = document.getElementById("chatArea");
  const userInput = document.getElementById("userInput");

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function addBubble(text, sender) {
    const bubble = document.createElement("div");
    bubble.className = `bubble ${sender}`;
    if (sender === "bot") {
      bubble.innerHTML = `<div class="bubble-label">Sofía</div>${text}`;
    } else {
      bubble.innerHTML = `<div class="bubble-label">Tú</div>${text}`;
    }
    chatArea.appendChild(bubble);
    chatArea.scrollTop = chatArea.scrollHeight;
    return bubble;
  }

  function showTyping() {
    const typing = document.createElement("div");
    typing.className = "typing";
    typing.id = "typing";
    typing.innerHTML = "<span></span><span></span><span></span>";
    chatArea.appendChild(typing);
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById("typing");
    if (t) t.remove();
  }

  async function sendMessage() {
    const text = userInput.value.trim();
    if (!text) return;

    addBubble(text, "user");
    userInput.value = "";
    userInput.style.height = 'auto';
    showTyping();

    try {
      const response = await fetch(N8N_WEBHOOK_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ chatInput: text })
      });

      const data = await response.json();
      removeTyping();

      const reply = data.output || data.text || data.message || "Lo siento, no pude procesar tu mensaje. ¿Puedes intentarlo de nuevo?";
      addBubble(reply, "bot");

    } catch (error) {
      removeTyping();
      addBubble("Hubo un problema de conexión. Por favor intenta de nuevo en un momento.", "bot");
    }
  }
</script>
</body>
</html>
